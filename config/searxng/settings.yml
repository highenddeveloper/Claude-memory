# SearXNG Configuration
# Tuned for API-only usage (no web UI needed)

use_default_settings: true

general:
  instance_name: "AI Dashboard Search"
  debug: false

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  formats:
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme-searxng-secret"
  limiter: true
  public_instance: false

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
  - name: arxiv
    engine: arxiv
    shortcut: ar
    disabled: false

outgoing:
  request_timeout: 10
  max_request_timeout: 15
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
